# High-Density Object Segmentation Configuration
# YOLACT + MobileNetV3 + Soft-NMS on SKU-110K

dataset:
  name: "SKU-110K"
  data_dir: "data/SKU110K_fixed"
  num_classes: 1  # single class: "object"
  input_size: 550
  train_subset: 5000  # use subset for faster training
  num_workers: 4
  pin_memory: true

backbone:
  name: "mobilenetv3_large"
  pretrained: true
  freeze_bn: false
  freeze_layers: 0  # number of early layers to freeze

fpn:
  out_channels: 256
  num_levels: 5  # P3, P4, P5, P6, P7
  use_smooth: true

yolact:
  num_prototypes: 32
  num_masks: 32
  mask_dim: 32
  max_detections: 300
  conf_threshold: 0.05
  nms_top_k: 200

anchors:
  sizes: [[24, 48], [48, 96], [96, 192], [192, 384], [384, 768]]
  aspect_ratios: [0.5, 1.0, 2.0]
  scales: [1.0, 1.26, 1.587]

training:
  epochs: 20
  batch_size: 8
  optimizer: "sgd"
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 3
  scheduler: "cosine"
  min_lr: 0.000001
  gradient_clip: 10.0
  amp: true  # mixed precision
  val_interval: 2  # validate every N epochs

loss:
  cls_weight: 1.0
  box_weight: 1.5
  mask_weight: 6.125
  focal_alpha: 0.25
  focal_gamma: 2.0
  neg_pos_ratio: 3

softnms:
  method: "gaussian"
  sigma: 0.5
  score_threshold: 0.001
  iou_threshold: 0.5  # for hard NMS fallback

evaluation:
  iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]
  max_detections: [1, 10, 100, 300]
  score_threshold: 0.05

deployment:
  onnx_opset: 11
  quantization: "int8"
  benchmark_warmup: 10
  benchmark_runs: 50
  input_size: 550
